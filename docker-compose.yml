services:
  postgres:
    image: postgres:16-alpine
    container_name: av-sim-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: av_sim_dashboard
      POSTGRES_USER: av_user
      POSTGRES_PASSWORD: av_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U av_user -d av_sim_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
